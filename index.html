<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TTS by Keep</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: white;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .tagline {
      text-align: center;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    textarea {
      width: 100%;
      height: 120px;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      resize: vertical;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 25px 0;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    select, input[type="range"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    .slider-container {
      margin: 15px 0;
    }
    .value {
      float: right;
      font-weight: bold;
    }
    button {
      background: #10b981;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
    button:hover {
      background: #059669;
    }
    .audio-container {
      margin-top: 30px;
      text-align: center;
    }
    audio {
      width: 100%;
      margin: 15px 0;
    }
    .download-btn {
      background: #3b82f6;
      margin-top: 10px;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      opacity: 0.8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 TTS by Keep</h1>
    <p class="tagline">Unlimited Voice Cloning Tool • 100% Free</p>

    <textarea id="textInput" placeholder="Type your text here..."></textarea>

    <div class="controls">
      <div>
        <label for="character">Select Character</label>
        <select id="character">
          <option value="keep1">Keep Voice 1</option>
          <option value="keep2">Keep Voice 2</option>
        </select>
      </div>
      <div>
        <label for="language">Language</label>
        <select id="language">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="ur">Urdu</option>
        </select>
      </div>
    </div>

    <div class="slider-container">
      <label>Speed <span class="value" id="speedValue">1.0x</span></label>
      <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0"/>
    </div>

    <div class="slider-container">
      <label>Pitch <span class="value" id="pitchValue">0</span></label>
      <input type="range" id="pitch" min="-12" max="12" step="0.5" value="0"/>
    </div>

    <button onclick="generateTTS()">🚀 Generate Speech</button>

    <div class="audio-container" id="audioContainer" style="display:none;">
      <audio id="audioPlayer" controls></audio>
      <button class="download-btn" onclick="downloadAudio()">⬇️ Download Audio</button>
    </div>
  </div>

  <footer>
    TTS by Keep • Powered by your voice samples • Runs 100% free
  </footer>

  <script>
    const speedSlider = document.getElementById('speed');
    const pitchSlider = document.getElementById('pitch');
    const speedValue = document.getElementById('speedValue');
    const pitchValue = document.getElementById('pitchValue');

    speedSlider.addEventListener('input', () => {
      speedValue.textContent = speedSlider.value + 'x';
    });

    pitchSlider.addEventListener('input', () => {
      pitchValue.textContent = pitchSlider.value;
    });

    let currentBlobUrl = null;

    function generateTTS() {
      const text = document.getElementById('textInput').value.trim();
      if (!text) {
        alert("Please enter some text!");
        return;
      }

      const utterance = new SpeechSynthesisUtterance(text);
      
      // Basic voice selection (browser voices)
      const voices = speechSynthesis.getVoices();
      const selectedLang = document.getElementById('language').value;
      utterance.lang = selectedLang === 'ur' ? 'ur-PK' : selectedLang === 'hi' ? 'hi-IN' : 'en-US';
      
      utterance.rate = parseFloat(speedSlider.value);
      utterance.pitch = 1 + (parseFloat(pitchSlider.value) / 12);   // convert semitones to pitch factor

      // Try to pick a nice voice
      const preferredVoice = voices.find(v => 
        v.lang.includes(selectedLang) || v.name.toLowerCase().includes('female')
      );
      if (preferredVoice) utterance.voice = preferredVoice;

      // Play directly
      const audioContainer = document.getElementById('audioContainer');
      const audioPlayer = document.getElementById('audioPlayer');
      
      // For real audio download we need Web Audio API recording (a bit complex)
      // For now we just speak
      speechSynthesis.speak(utterance);

      // Show placeholder (you can enhance this later with recording)
      audioContainer.style.display = 'block';
      alert("Speaking now using browser TTS.\n\nTo use your real cloned voice (Keep Voice 1/2), we need the Python backend running.");
    }

    function downloadAudio() {
      alert("Download feature works best when connected to Python backend.\n\nFor now, use screen recording or the Python version.");
    }

    // Load voices
    speechSynthesis.onvoiceschanged = () => {
      console.log("Voices loaded");
    };
  </script>
</body>
</html>
